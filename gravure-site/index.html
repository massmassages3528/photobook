<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寫真集 / Photo Books — Japan Gravure Idol Collection</title>
  <meta name="description" content="Japan Gravure Idol Photo Book Collection — 日本性感女神精選 — 일본 그라비아 아이돌 특선" />
  <meta name="theme-color" content="#08070d" />

  <!-- Preconnect for fonts (loaded in CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════════
     APP ROOT
     ══════════════════════════════════════════════════ -->
<div class="app-root">

  <!-- ── Sidebar (PC) ──────────────────────────────── -->
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo" id="sb-logo">寫真集</div>
      <div class="sidebar-sub"  id="sb-sub">日本性感女神精選</div>
    </div>

    <div class="sidebar-ornament">
      <span class="sidebar-ornament-glyph">✦</span>
    </div>

    <nav class="sidebar-nav" id="sb-nav">
      <!-- Rendered by JS -->
    </nav>

    <div class="sidebar-divider"></div>

    <div class="sidebar-lang">
      <div class="sidebar-lang-label" id="sb-lang-label">語言</div>
      <div class="sidebar-lang-btns"  id="sb-lang-btns">
        <!-- Rendered by JS -->
      </div>
    </div>
  </aside>

  <!-- ── Main Column ───────────────────────────────── -->
  <div class="app-main-col">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <div class="header-title-block">
          <h1 class="header-title" id="h-title">寫真集</h1>
          <p  class="header-sub"   id="h-sub">日本性感女神精選</p>
        </div>
        <div class="header-lang-row" id="h-lang">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Search -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="搜尋女神姓名、作品名稱"
          autocomplete="off"
        />
        <button class="search-clear" id="search-clear" style="display:none" aria-label="Clear search">✕</button>
      </div>

      <!-- Sort + count -->
      <div class="sort-row">
        <div class="sort-btns" id="sort-btns">
          <!-- Rendered by JS -->
        </div>
        <span class="result-count" id="result-count">共 12 件</span>
      </div>
    </header>

    <!-- Card grid -->
    <main>
      <div class="card-grid" id="card-grid">
        <!-- Rendered by JS -->
      </div>
    </main>

  </div><!-- /.app-main-col -->

  <!-- ── Tab bar (Mobile) ──────────────────────────── -->
  <nav class="app-tabbar" id="tabbar">
    <!-- Rendered by JS -->
  </nav>

</div><!-- /.app-root -->


<!-- ══════════════════════════════════════════════════
     DETAIL MODAL
     ══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-sheet" id="modal-sheet">

    <!-- Left / Top: hero image -->
    <div class="modal-left" id="modal-left">
      <button class="modal-close-btn" id="modal-close-btn" aria-label="Close">✕</button>

      <div class="modal-handle">
        <div class="modal-handle-bar"></div>
      </div>

      <div class="modal-hero">
        <!-- Fallback bg -->
        <div class="modal-hero-fallback" id="modal-hero-fallback">
          <span class="modal-hero-fallback-char" id="modal-hero-fallback-char"></span>
        </div>
        <!-- Cover image -->
        <img class="modal-hero-img" id="modal-hero-img" src="" alt="" />
        <!-- Gradient overlay -->
        <div class="modal-hero-grad"></div>
        <!-- Text info -->
        <div class="modal-hero-info">
          <div class="modal-tag-badge" id="modal-tag-badge"></div>
          <div class="modal-title-main" id="modal-title-main"></div>
          <div class="modal-name-sub"   id="modal-name-sub"></div>
        </div>
      </div>
    </div><!-- /.modal-left -->

    <!-- Right / Bottom: scrollable content -->
    <div class="modal-right" id="modal-right">
      <div class="modal-body-content">

        <!-- Accent top line -->
        <div class="modal-accent-line" id="modal-accent-line"></div>

        <!-- CTA buttons -->
        <div class="cta-area" id="modal-cta"></div>

        <!-- YouTube thumbnail section -->
        <div style="margin:0 0 14px">
          <div class="modal-section-label" id="modal-yt-label-text">📹 幕後花絮影片</div>
          <div class="yt-thumb-card" id="yt-thumb-card" role="button" tabindex="0">
            <img id="yt-thumb-img" src="" alt="YouTube thumbnail" />
            <div class="yt-overlay-dark"></div>
            <div class="yt-play-center">
              <div class="yt-play-circle" id="yt-play-circle">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white" style="margin-left:4px">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </div>
            </div>
            <div class="yt-red-badge">
              <svg width="13" height="9" viewBox="0 0 24 17" fill="white">
                <path d="M23.5 2.5s-.3-1.9-1.1-2.7c-1.1-1.1-2.3-1.1-2.8-1.2C16.6-.1 12 0 12 0S7.4-.1 4.4.6C3.9.7 2.7.7 1.6 1.8.8 2.6.5 4.5.5 4.5S.2 6.7.2 8.9v2.1c0 2.2.3 4.4.3 4.4s.3 1.9 1.1 2.7c1.1 1.1 2.5 1.1 3.1 1.2C6.8 19.4 12 19.5 12 19.5s4.6 0 7.6-.8c.5-.1 1.7-.7 2.8-1.8.8-.8 1.1-2.7 1.1-2.7s.3-2.2.3-4.4V7c0-2.2-.3-4.5-.3-4.5zM9.7 13.5V5.4l7.6 4.1-7.6 4z"/>
              </svg>
              ▶ <span id="yt-play-label">再生する</span>
            </div>
            <div class="yt-label-left">📹 メイキング動画</div>
          </div>
        </div>

        <!-- Description -->
        <p class="modal-desc" id="modal-desc"></p>

        <!-- Details table -->
        <div class="details-table" id="modal-details-table"></div>

      </div>
    </div><!-- /.modal-right -->

  </div><!-- /.modal-sheet -->
</div><!-- /.modal-overlay -->


<!-- ══════════════════════════════════════════════════
     YOUTUBE PLAYER OVERLAY
     ══════════════════════════════════════════════════ -->
<div class="yt-player-overlay" id="yt-player-overlay">
  <div class="yt-player-inner">
    <div class="yt-player-frame" id="yt-player-frame"></div>
  </div>
  <button class="yt-close-btn" id="yt-close-btn">✕ 閉じる</button>
</div>


<!-- ── ES Module entry point ────────────────────────── -->
<script type="module" src="js/app.js"></script>

</body>
</html>
